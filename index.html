<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ffd6e7, #ffe6f0);
      padding: 40px;
      overflow: hidden;
    }

    h1, h2 {
      color: #333;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      margin: 15px;
      border: none;
      border-radius: 10px;
      background-color: #ff4d88;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff1a66;
    }

    #noBtn {
      position: absolute;
    }

    #counter {
      font-size: 20px;
      margin-top: 20px;
      color: #555;
    }
  </style>
</head>

<body>

<h1 id="text">Hey you… ❤️</h1>
<button onclick="next()">Click me</button>

<div id="counter"></div>

<div id="choices" style="display:none;">
  <h2>Be honest… do you love me? 😏</h2>
  <button onclick="yes()">Yes ❤️</button>
  <button id="noBtn" onmouseover="moveNo()">No 😜</button>
</div>

<script>

let step = 0;

const story = [

"It still makes me laugh how all of this started…",

"You posted a picture… and out of everything I could’ve said…",

"I asked… 'Which shampoo do you use?' 😭",

"And you said… Sunsilk 😂",

"I swear… I didn’t care about shampoo at all.",

"I just wanted a reply from you.",

"And somehow… during your exams… when you weren’t even talking to anyone…",

"You replied to me.",

"I don’t know if that was luck… or fate…",

"But I’m really glad it happened.",

"Those first days weren’t perfect.",

"I didn’t try to act strong…",

"In fact… I was a complete mess.",

"I was stressed… overwhelmed…",

"And I even cried in front of you.",

"And you know what?",

"You stayed.",

"Even when you had your own problems…",

"You still stayed with me.",

"Then one day… you said you were leaving your main account…",

"But you didn’t leave me.",

"You came back… just for me.",

"And then… you gave me your WhatsApp…",

"Just because you liked my voice 🥺",

"That’s when I knew… this wasn’t random anymore.",

"Somewhere between our talks…",

"Your sleepy voice on calls…",

"And you falling asleep like a baby…",

"You became my peace.",

"You always say you sleep because you feel safe with me…",

"But you don’t know…",

"You became my safe place too.",

"I remember thinking you looked a little rude at first 😭",

"But you turned out to be the softest girl ever.",

"A girl with standards…",

"With loyalty…",

"And a heart so sensitive…",

"And then I saw your strength.",

"You were stuck in something unfair…",

"But you fought it.",

"And you chose yourself.",

"And somehow… after everything…",

"You chose me.",

"And that…",

"That means everything to me.",

"You didn’t just become my girlfriend…",

"You changed me.",

"You made me calmer.",

"You taught me respect.",

"You made me take life seriously.",

"And the funniest part is…",

"I didn’t even realize when I fell in love.",

"Maybe it was when I started talking like you 😭",

"Calling you bubu… jaan…",

"Doing all those cute things I never imagined.",

"Or maybe…",

"It was just you.",

"You are beautiful.",

"Loyal.",

"Childish in the cutest way.",

"A little dramatic 😏",

"And completely mine ❤️",

"And I mean this…",

"Choosing you…",

"Is the best decision of my life.",

"And one day…",

"This distance won’t exist anymore.",

"But even now…",

"You are the closest person to my heart."

];

function next() {
  if (step < story.length) {
    document.getElementById("text").innerText = story[step];
    document.getElementById("counter").innerText = "Memory " + (step + 1) + " ❤️";
    step++;
  } else {
    document.getElementById("text").style.display = "none";
    document.querySelector("button").style.display = "none";
    document.getElementById("counter").style.display = "none";
    document.getElementById("choices").style.display = "block";
  }
}

function moveNo() {
  const btn = document.getElementById("noBtn");
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

function yes() {
  document.body.innerHTML = `
    <h1>Happy Birthday, my love ❤️</h1>
    <h2>You are my peace, my happiness, my everything.</h2>
    <p>I love you more than words can explain.</p>
  `;
}

</script>

</body>
</html>
